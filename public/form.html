<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outlet Form</title>
  <style>
    :root {
      --bg:#090b11; --card:#161c2d; --surface:#111520; --border:#242d46;
      --accent:#c9a84c; --text:#e8e6f0; --muted:#6b7494; --green:#3ecf8e; --red:#e05a5a;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;
      padding:32px;width:100%;max-width:440px;}
    h1{font-size:22px;margin-bottom:6px;}
    .sub{color:var(--muted);font-size:13px;margin-bottom:24px;}
    label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.06em;
      color:var(--muted);margin-bottom:8px;}
    input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;
      color:var(--text);font-size:15px;padding:12px 14px;outline:none;margin-bottom:18px;}
    input:focus{border-color:var(--accent);}
    input[readonly]{color:var(--muted);cursor:not-allowed;}
    button{width:100%;background:linear-gradient(135deg,#d8bd63,#c9a84c);color:#1a1505;
      border:none;border-radius:10px;font-size:15px;font-weight:600;padding:14px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;}
    button:disabled{opacity:.6;cursor:not-allowed;}
    .msg{text-align:center;font-size:14px;margin-top:16px;min-height:20px;}
    .msg.ok{color:var(--green);} .msg.err{color:var(--red);}
    .state{text-align:center;color:var(--muted);padding:40px 0;}

    /* spinner */
    .spinner{width:16px;height:16px;border:2px solid rgba(26,21,5,.35);border-top-color:#1a1505;
      border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* OTP modal */
    .overlay{position:fixed;inset:0;background:rgba(5,7,12,.72);backdrop-filter:blur(3px);
      display:none;align-items:center;justify-content:center;padding:24px;}
    .overlay.show{display:flex;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:28px;width:100%;max-width:380px;text-align:center;}
    .otp-input{letter-spacing:10px;text-align:center;font-size:22px;font-family:monospace;}
    .resend{background:none;border:none;color:var(--accent);font-size:13px;width:auto;
      padding:8px;margin-top:10px;cursor:pointer;display:inline-flex;}
    .resend:disabled{color:var(--muted);}
    .success-icon{font-size:46px;}
  </style>
</head>
<body>
  <div class="card">
    <div id="loading" class="state">Loading outlet…</div>

    <!-- Step 1: the form -->
    <form id="outletForm" style="display:none;">
      <h1>📍 Outlet Details</h1>
      <p class="sub">Fill in your details and submit to verify.</p>

      <label for="outletName">Outlet Name</label>
      <input id="outletName" type="text" readonly />

      <label for="outletId">Outlet ID</label>
      <input id="outletId" type="text" readonly />

      <label for="userName">Your Name</label>
      <input id="userName" type="text" autocomplete="name" required />

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required />

      <label for="age">Age</label>
      <input id="age" type="number" min="1" max="120" />

      <button id="submitBtn" type="submit">Submit</button>
      <div id="msg" class="msg"></div>
    </form>

    <!-- Final success state -->
    <div id="done" class="state" style="display:none;">
      <div class="success-icon">✅</div>
      <h1 style="margin-top:10px;">Submitted</h1>
      <p class="sub" style="margin-top:6px;">Your details were verified and saved.</p>
    </div>

    <div id="invalid" class="state" style="display:none;color:var(--red);">
      ⚠ This link is invalid or has expired.
    </div>
  </div>

  <!-- Step 2: OTP modal -->
  <div id="otpOverlay" class="overlay">
    <div class="modal">
      <h1 style="font-size:19px;">Verify your email</h1>
      <p class="sub" id="otpSubtitle" style="margin:8px 0 20px;"></p>
      <input id="otpInput" class="otp-input" type="text" inputmode="numeric"
             maxlength="6" placeholder="••••••" />
      <button id="verifyBtn">Verify &amp; Submit</button>
      <button id="resendBtn" class="resend">Resend code</button>
      <div id="otpMsg" class="msg"></div>
      <button id="changeEmailBtn" class="resend" style="display:block;margin:6px auto 0;color:var(--muted);">← Wrong email? Change it</button>
    </div>
  </div>

  <script>
    const ref = new URLSearchParams(location.search).get('ref');
    const $ = id => document.getElementById(id);

    // ── Load outlet from the opaque token ──────────────────────────────────────
    (async function init() {
      if (!ref) return showInvalid();
      try {
        const res  = await fetch('/api/outlets/resolve?ref=' + encodeURIComponent(ref));
        const data = await res.json();
        if (!data.success) return showInvalid();
        $('outletName').value = data.outlet.outlet_name || '';
        $('outletId').value   = data.outlet.outlet_id;
        $('loading').style.display    = 'none';
        $('outletForm').style.display = 'block';
      } catch (e) { showInvalid(); }
    })();

    function showInvalid() {
      $('loading').style.display = 'none';
      $('invalid').style.display = 'block';
    }

    function spin(btn, label) {
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> ${label}`;
    }
    function unspin(btn, label) {
      btn.disabled = false;
      btn.textContent = label;
    }

    // ── Step 1: submit form → request OTP ──────────────────────────────────────
    $('outletForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = $('email').value.trim();
      const msg = $('msg');
      msg.className = 'msg';
      spin($('submitBtn'), 'Submitting…');
      try {
        const res  = await fetch('/api/otp/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref, email }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Could not send code');
        openOtpModal(email);
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = '✗ ' + err.message;
      } finally {
        unspin($('submitBtn'), 'Submit');
      }
    });

    // ── Step 2: OTP modal ──────────────────────────────────────────────────────
    function maskEmail(e) {
      const [u, d] = e.split('@');
      return (u.length <= 2 ? u[0] + '•' : u.slice(0,2) + '•••') + '@' + d;
    }

    function openOtpModal(email) {
      $('otpSubtitle').textContent = 'Enter the 6-digit code sent to ' + maskEmail(email);
      $('otpInput').value = '';
      $('otpMsg').textContent = '';
      $('otpOverlay').classList.add('show');
      $('otpInput').focus();
      startResendCooldown();
    }

    let cooldownTimer;
    function startResendCooldown() {
      let left = 30;
      const btn = $('resendBtn');
      btn.disabled = true;
      clearInterval(cooldownTimer);
      const tick = () => {
        btn.textContent = left > 0 ? `Resend code (${left}s)` : 'Resend code';
        if (left <= 0) { btn.disabled = false; clearInterval(cooldownTimer); }
        left--;
      };
      tick();
      cooldownTimer = setInterval(tick, 1000);
    }

    // "Wrong email? Change it" → close the modal and go back to the form.
    $('changeEmailBtn').addEventListener('click', () => {
      $('otpOverlay').classList.remove('show');
      clearInterval(cooldownTimer);
      $('otpInput').value = '';
      $('email').focus();
      $('email').select();
    });

    $('resendBtn').addEventListener('click', async () => {
      const email = $('email').value.trim();
      $('otpMsg').className = 'msg';
      $('otpMsg').textContent = 'Sending…';
      try {
        const res  = await fetch('/api/otp/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref, email }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Could not resend');
        $('otpMsg').className = 'msg ok';
        $('otpMsg').textContent = '✓ New code sent';
        startResendCooldown();
      } catch (err) {
        $('otpMsg').className = 'msg err';
        $('otpMsg').textContent = '✗ ' + err.message;
      }
    });

    $('verifyBtn').addEventListener('click', async () => {
      const email = $('email').value.trim();
      const otp   = $('otpInput').value.trim();
      const msg   = $('otpMsg');
      if (otp.length < 4) { msg.className = 'msg err'; msg.textContent = 'Enter the code'; return; }
      msg.className = 'msg';
      spin($('verifyBtn'), 'Verifying…');
      try {
        const res  = await fetch('/api/otp/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ref, email, otp,
            name: $('userName').value.trim(),
            age:  $('age').value,
          }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || 'Verification failed');
        // Success → swap to the done screen
        $('otpOverlay').classList.remove('show');
        $('outletForm').style.display = 'none';
        $('done').style.display = 'block';
      } catch (err) {
        msg.className = 'msg err';
        msg.textContent = '✗ ' + err.message;
        unspin($('verifyBtn'), 'Verify & Submit');
      }
    });
  </script>
</body>
</html>
